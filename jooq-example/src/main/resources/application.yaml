spring:
  application:
    name: jooq-example
  datasource:
    url: jdbc:h2:file:~/.test/jooq-example-db;
    driver-class-name: org.h2.Driver
    username: admin
    password: admin
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

logging:
  level:
    org:
      jooq:
        tools:
          LoggerListener: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /v3/api-docs