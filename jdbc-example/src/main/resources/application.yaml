spring:
  application:
    name: jdbc-example
  datasource:
    url: jdbc:h2:file:~/.test/jdbc-example-db;
    driver-class-name: org.h2.Driver
    username: admin
    password: admin
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

flyway:
  enabled: true
  locations: classpath:db/migration

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs
